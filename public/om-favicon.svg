<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b35;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#f7931e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fbb03b;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="50" cy="50" r="48" fill="url(#grad)"/>
  
  <!-- Om symbol in white -->
  <g fill="#ffffff" transform="translate(50, 50) scale(0.8)">
    <!-- Top curve of Om -->
    <path d="M -15,-20 Q -20,-25 -15,-30 Q -10,-35 0,-30 Q 5,-28 5,-22 Q 5,-15 0,-12 Q -5,-10 -10,-12 Q -15,-14 -15,-20 Z"/>
    
    <!-- Middle section -->
    <path d="M -5,-10 Q 0,-8 5,-10 L 8,-5 Q 10,0 8,5 Q 5,8 0,8 Q -5,8 -8,5 Q -10,0 -8,-5 Z"/>
    
    <!-- Bottom curve -->
    <path d="M -2,8 Q 0,12 5,15 Q 10,18 15,15 Q 18,12 18,8 Q 18,5 15,3 L 10,5 Q 8,8 5,8 Q 2,8 0,10 Z"/>
    
    <!-- Right tail -->
    <path d="M 15,3 Q 20,0 25,-5 Q 28,-10 25,-15 Q 22,-18 18,-18 Q 15,-18 12,-15 L 15,-12 Q 18,-10 20,-8 Q 22,-5 20,-2 Q 18,0 15,3 Z"/>
    
    <!-- Dot on top -->
    <circle cx="-15" cy="-35" r="3"/>
    
    <!-- Bottom line -->
    <rect x="-25" y="20" width="50" height="3" rx="1.5"/>
  </g>
</svg>
